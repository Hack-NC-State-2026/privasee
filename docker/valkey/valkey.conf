# Docker publishes this service on 127.0.0.1 only for local development.
# Protected mode must be disabled because Docker port forwarding is seen as a
# non-loopback client from inside the container.
bind 0.0.0.0
protected-mode no
port 6379

dir /data
dbfilename dump.rdb

save 3600 1
save 300 100
save 60 10000

appendonly no
